services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-gardafrigo}
      MARIADB_USER: ${WORDPRESS_DB_USER:-gardafrigo}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-gardafrigo}
      MARIADB_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD:-gardafrigo-root}
    volumes:
      - db-data:/var/lib/mysql

  wordpress:
    image: wordpress:php8.2-apache
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-gardafrigo}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-gardafrigo}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-gardafrigo}
      AVADA_LICENSE_KEY: ${AVADA_LICENSE_KEY:-}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG', true);
        define('WP_DEBUG_LOG', true);
        define('DISALLOW_FILE_EDIT', true);
    volumes:
      - wordpress-core:/var/www/html
      - ./wp-content:/var/www/html/wp-content

  wpcli:
    image: wordpress:cli-php8.2
    depends_on:
      - db
      - wordpress
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-gardafrigo}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-gardafrigo}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-gardafrigo}
    volumes:
      - wordpress-core:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./scripts:/scripts
      - ./avada-packages:/avada-packages
    working_dir: /var/www/html

volumes:
  db-data:
  wordpress-core:
